<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevianTarot | Девиантное Таро</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Jost:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background-color: #0A0A0A;
        color: #EAEFEA;
        line-height: 1.6;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .font-host { font-family: 'Host Grotesk', sans-serif; }
      .font-jost { font-family: 'Jost', sans-serif; }
      .font-futura { font-family: 'Futura', 'Jost', sans-serif; }
      
      .background-glow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }
      .background-glow::after {
        content: '';
        position: absolute;
        width: 600px;
        height: 600px;
        background: #A6FEB6;
        border-radius: 50%;
        filter: blur(250px);
        opacity: 0.12;
        bottom: -250px;
        right: -250px;
      }

      #noise-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 9999;
      }
      #noise-overlay::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        filter: url(#noiseFilter);
        opacity: 0.18;
      }
    </style>
  </head>
  <body>
    <!-- Noise Overlay -->
    <div id="noise-overlay"></div>
    <svg style="display: none;">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      </filter>
    </svg>

    <!-- Background Glow -->
    <div class="background-glow"></div>

    <main class="flex-grow flex items-center justify-center relative z-10">
      <div class="text-center px-6">
        <h1 class="text-6xl md:text-8xl font-host font-bold mb-8 opacity-20">404</h1>
        <p class="text-xl md:text-2xl font-jost font-light tracking-wide">
          ещё не доделала сайт >_<
        </p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-black py-16 px-6 relative z-10">
      <div class="max-w-7xl mx-auto flex flex-col items-center md:items-start gap-10 text-center md:text-left">
        <a href="index.html" class="flex items-center gap-3 group">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="w-8 h-8">
            <g>
              <polygon fill="#B4D8C4" points="506.95 147.08 506.95 192.36 404.15 192.36 404.15 480.26 358.83 480.26 358.83 147.08 506.95 147.08"/>
              <rect fill="#B4D8C4" x="358.83" y="34.89" width="147.44" height="45.28"/>
            </g>
            <path fill="#B4D8C4" d="M7.82,34.22h282.03v446.04H7.82V34.22ZM53.14,439.03c54.23.89,112.01-11.39,149.48-53.03,52.76-58.64,55.38-175.73,12.43-240.21-36.07-54.15-99.33-71.81-161.92-70.34v363.59Z"/>
          </svg>
          <span class="font-futura text-xl font-semibold tracking-wider text-[#B4D8C4] group-hover:opacity-80 transition-opacity">
            DEVIANTAROT
          </span>
        </a>
        <div class="flex flex-wrap items-center justify-center md:justify-start gap-6 md:gap-8">
            <a href="https://t.me/deviantarot" target="_blank" class="text-xs text-[#A8B0A9] hover:text-[#EAEFEA] transition-colors uppercase font-bold tracking-[0.2em]">Telegram</a>
            <a href="https://youtube.com/@deviantarot" target="_blank" class="text-xs text-[#A8B0A9] hover:text-[#EAEFEA] transition-colors uppercase font-bold tracking-[0.2em]">YouTube</a>
            <a href="https://vk.com/deviantarot" target="_blank" class="text-xs text-[#A8B0A9] hover:text-[#EAEFEA] transition-colors uppercase font-bold tracking-[0.2em]">VK</a>
        </div>
      </div>
    </footer>
  </body>
</html>
